services:
  db:
    image: postgres:16
    container_name: shared_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shared_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: shared_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  polytech:
    profiles: [app]
    build:
      context: .
      dockerfile: polytech.Dockerfile
    container_name: polytech_app
    ports:
      - "8080:8080"
    depends_on:
      - db
      - erasmumu
      - mi8
      - rabbitmq
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=school
      - ERASMUMU_URL=http://erasmumu:8081
      - MI8_GRPC_HOST=mi8
      - MI8_GRPC_PORT=8082
      - RABBITMQ_HOST=rabbitmq

  erasmumu:
    profiles: [app]
    build:
      context: .
      dockerfile: erasmumu.Dockerfile
    container_name: erasmumu_app
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=school
      - RABBITMQ_HOST=rabbitmq

  mi8:
    profiles: [app]
    build:
      context: .
      dockerfile: mi8.Dockerfile
    container_name: mi8_app
    ports:
      - "8082:8082"
    depends_on:
      - redis
      - rabbitmq
    environment:
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq

  laposte:
    profiles: [app]
    build:
      context: .
      dockerfile: laposte.Dockerfile
    container_name: laposte_app
    ports:
      - "8083:8083"
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_HOST=rabbitmq

  frontend:
    profiles: [app]
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: frontend_app
    ports:
      - "5173:5173"
    depends_on:
      - polytech
    environment:
      - POLYTECH_BASE_URL=http://polytech:8080
      - LAPOSTE_BASE_URL=http://laposte:8083

volumes:
  postgres_data:
