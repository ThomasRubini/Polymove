syntax = "proto3";

package mi8;

option go_package = "mi8/proto";

service MI8Service {
  rpc GetScores(GetScoresRequest) returns (GetScoresResponse);
  rpc GetNews(GetNewsRequest) returns (GetNewsResponse);
  rpc GetCityStats(GetCityStatsRequest) returns (CityStats);
}

message CityScore {
  string city = 1;
  double safety = 2;
  double economy = 3;
  double qol = 4;
  double culture = 5;
  double relevance = 6;
}

message News {
  int32 id = 1;
  string city = 2;
  string title = 3;
  string content = 4;
  string created_at = 5;
  repeated string tags = 6;
}

message GetScoresRequest {
  string city = 1;
}

message GetScoresResponse {
  repeated CityScore scores = 1;
}

message GetNewsRequest {
  string city = 1;
}

message GetNewsResponse {
  repeated News news = 1;
}

message GetCityStatsRequest {
  string city = 1;
}

message CityStats {
  string city = 1;
  int32 total_offers = 2;
  map<string, int32> offers_by_domain = 3;
  string last_offer_date = 4;
}
