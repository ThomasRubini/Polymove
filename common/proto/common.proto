syntax = "proto3";

package mi8;

option go_package = "mi8/proto";

service MI8Service {
  rpc GetScores(GetScoresRequest) returns (GetScoresResponse);
  rpc CreateScore(CreateScoreRequest) returns (CityScore);
  rpc GetNews(GetNewsRequest) returns (GetNewsResponse);
  rpc CreateNews(CreateNewsRequest) returns (News);
}

message CityScore {
  string city = 1;
  double safety = 2;
  double economy = 3;
  double qol = 4;
  double culture = 5;
  double relevance = 6;
}

message News {
  int32 id = 1;
  string city = 2;
  string title = 3;
  string content = 4;
  string created_at = 5;
  repeated string tags = 6;
}

message GetScoresRequest {
  string city = 1;
}

message GetScoresResponse {
  repeated CityScore scores = 1;
}

message CreateScoreRequest {
  CityScore score = 1;
}

message GetNewsRequest {
  string city = 1;
}

message GetNewsResponse {
  repeated News news = 1;
}

message CreateNewsRequest {
  string city = 1;
  string title = 2;
  string content = 3;
  repeated string tags = 4;
}
